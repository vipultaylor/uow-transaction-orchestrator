<template>
    <ul lwc:if={hasSpans} class="slds-timeline">
        <template for:each={spans} for:item="span">
            <!-- Span Event (point-in-time occurrence) -->
            <c-uow-span-event
                lwc:if={span.isEvent}
                key={span.spanId}
                span={span}>
            </c-uow-span-event>

            <!-- Standard Span (operation with duration) -->
            <c-uow-span-item
                lwc:else
                key={span.spanId}
                span={span}
                total-duration-ms={totalDurationMs}>
            </c-uow-span-item>
        </template>
    </ul>
</template>
